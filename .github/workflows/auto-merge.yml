name: Auto-merge approved PRs

# Merges PRs into protected `main` or `staging` once they are approved AND
# all required status checks have passed.
# Runs with the workflow's GITHUB_TOKEN (contents: write + pull-requests: write),
# which is the sanctioned path for merging into branch-protected refs.
#
# Trigger: a reviewer submits an APPROVAL (pull_request_review: submitted).
# On that event we merge immediately using the workflow's GITHUB_TOKEN, which is
# the sanctioned merge authority for branch-protected refs (the REST/UI merge
# endpoint alone cannot merge into a PR-protected branch). After merge, GitHub
# deletes the head branch if "Automatically delete head branches" is enabled on
# the branch protection rule (set in the repo UI).
#
# NOTE: the workflow NEVER deletes branches itself — deleting staging/main is
# impossible because this only runs on PRs whose head is a feature branch.
on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on the target repo's own PRs (not forks) targeting main or staging,
    # and only on an actual APPROVAL (not a comment/dismiss/changes-requested).
    if: >-
      (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'staging') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.review.state == 'approved'
    steps:
      - name: Author gate (main is whitelisted)
        id: check
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE: ${{ github.event.pull_request.base.ref }}
        run: |
          if [ "$BASE" = "main" ]; then
            WHITELIST="schneidergithub"
            if [ "$AUTHOR" != "$WHITELIST" ]; then
              echo "Author '$AUTHOR' not whitelisted for main ($WHITELIST). Skipping."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Merge (squash) via GITHUB_TOKEN
        if: steps.check.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # GITHUB_TOKEN is the sanctioned merge authority for protected branches.
          # This succeeds where the REST/UI merge endpoint alone is blocked by the
          # branch-protection rule, because the workflow runs with contents: write.
          gh pr merge --squash "$PR_URL"
