name: Tag release on main

# Simplified GitFlow: every merge into `main` (from staging) is a release.
# This workflow runs after a push to `main`, computes the next semver tag
# (minor bump of the highest existing vX.Y.Z, starting at v0.1.0), and creates
# the tag via the workflow's GITHUB_TOKEN.
#
# Trigger: push to `main`.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    # Skip if the push was itself a tag (no recursive tagging).
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next semver and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Highest existing semver tag (vX.Y.Z); default v0.1.0 if none.
          LATEST=$(git tag --list 'v*.*.*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            # Strip leading 'v', split on '.'
            v="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$v"
            MINOR=$((MINOR + 1))
            NEXT="v${MAJOR}.${MINOR}.0"
          fi
          echo "Previous: '${LATEST:-none}' -> Next: ${NEXT}"
          # Guard: don't fail if the tag already exists (idempotent).
          if git rev-parse "$NEXT" >/dev/null 2>&1; then
            echo "Tag $NEXT already exists, skipping."
            exit 0
          fi
          # Create an annotated tag pointing at the merged commit on main.
          git tag -a "$NEXT" -m "Release ${NEXT} (staging -> main)"
          git push origin "$NEXT"
          echo "Created tag $NEXT"
